name: deploy dev

on:
  workflow_run:
    workflows: ["main ci"]
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  deploy-dev:
    name: Trigger DEV deployment in Spacelift
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'

    steps:
      - name: Resolve release metadata
        id: release
        shell: bash
        run: |
          set -euo pipefail

          RELEASE_SHA="${{ github.event.workflow_run.head_sha }}"
          RELEASE_KEY="workers/${RELEASE_SHA}/worker-bundle.tar.gz"

          echo "release_sha=${RELEASE_SHA}" >> "$GITHUB_OUTPUT"
          echo "release_key=${RELEASE_KEY}" >> "$GITHUB_OUTPUT"

          echo "Resolved release SHA: ${RELEASE_SHA}"
          echo "Resolved release key: ${RELEASE_KEY}"

      - name: Show deploy inputs
        shell: bash
        run: |
          echo "stack_id=${{ vars.SPACELIFT_DEV_STACK_ID }}"
          echo "release_sha=${{ steps.release.outputs.release_sha }}"
          echo "release_key=${{ steps.release.outputs.release_key }}"

      - name: Trigger DEV run via Spacelift GraphQL
        env:
          SPACELIFT_API_KEY_ENDPOINT: ${{ vars.SPACELIFT_API_KEY_ENDPOINT }}
          SPACELIFT_API_KEY_ID: ${{ secrets.SPACELIFT_API_KEY_ID }}
          SPACELIFT_API_KEY_SECRET: ${{ secrets.SPACELIFT_API_KEY_SECRET }}
          SPACELIFT_DEV_STACK_ID: ${{ vars.SPACELIFT_DEV_STACK_ID }}
          RELEASE_SHA: ${{ steps.release.outputs.release_sha }}
          RELEASE_KEY: ${{ steps.release.outputs.release_key }}
        shell: bash
        run: |
          set -euo pipefail

          test -n "${SPACELIFT_API_KEY_ENDPOINT:-}" || { echo "SPACELIFT_API_KEY_ENDPOINT is not set"; exit 1; }
          test -n "${SPACELIFT_API_KEY_ID:-}" || { echo "SPACELIFT_API_KEY_ID is not set"; exit 1; }
          test -n "${SPACELIFT_API_KEY_SECRET:-}" || { echo "SPACELIFT_API_KEY_SECRET is not set"; exit 1; }
          test -n "${SPACELIFT_DEV_STACK_ID:-}" || { echo "SPACELIFT_DEV_STACK_ID is not set"; exit 1; }
          test -n "${RELEASE_SHA:-}" || { echo "RELEASE_SHA is not set"; exit 1; }
          test -n "${RELEASE_KEY:-}" || { echo "RELEASE_KEY is not set"; exit 1; }

          JWT="$(
            curl -sS \
              -X POST "${SPACELIFT_API_KEY_ENDPOINT}/graphql" \
              -H "Content-Type: application/json" \
              --data "{\"query\":\"mutation GetSpaceliftToken(\$id: ID!, \$secret: String!) { apiKeyUser(id: \$id, secret: \$secret) { jwt } }\",\"variables\":{\"id\":\"${SPACELIFT_API_KEY_ID}\",\"secret\":\"${SPACELIFT_API_KEY_SECRET}\"}}" \
            | python3 -c 'import sys, json; print(json.load(sys.stdin)["data"]["apiKeyUser"]["jwt"])'
          )"

          echo "JWT acquired"

          RESPONSE="$(
            curl -sS \
              -X POST "${SPACELIFT_API_KEY_ENDPOINT}/graphql" \
              -H "Authorization: Bearer ${JWT}" \
              -H "Content-Type: application/json" \
              --data "$(cat <<EOF
          {
            "query": "mutation RunTrigger(\$stack: ID!, \$commitSha: String!, \$runtimeConfig: RuntimeConfigInput) { runTrigger(stack: \$stack, commitSha: \$commitSha, runtimeConfig: \$runtimeConfig) { id } }",
            "variables": {
              "stack": "${SPACELIFT_DEV_STACK_ID}",
              "commitSha": "${RELEASE_SHA}",
              "runtimeConfig": {
                "environment": [
                  {
                    "key": "TF_VAR_release_sha",
                    "value": "${RELEASE_SHA}"
                  },
                  {
                    "key": "TF_VAR_release_key",
                    "value": "${RELEASE_KEY}"
                  },
                  {
                    "key": "TF_VAR_worker_script_path",
                    "value": "/mnt/workspace/.artifact/releases/${RELEASE_SHA}/worker/entry.js"
                  },
                  {
                    "key": "TF_VAR_static_dir",
                    "value": "/mnt/workspace/.artifact/releases/${RELEASE_SHA}/static"
                  }
                ]
              }
            }
          }
          EOF
          )"
          )"

          echo "${RESPONSE}"

          RUN_ID="$(printf '%s' "${RESPONSE}" | python3 -c 'import sys, json; data=json.load(sys.stdin); print(data["data"]["runTrigger"]["id"])')"
          test -n "${RUN_ID}" || { echo "Failed to extract run ID"; exit 1; }

          echo "Triggered Spacelift run: ${RUN_ID}"
