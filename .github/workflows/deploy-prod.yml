name: deploy prod

on:
  push:
    branches:
      - deploy-prod

permissions:
  contents: read

concurrency:
  group: deploy-prod
  cancel-in-progress: true

jobs:
  deploy-prod:
    name: Trigger PROD deployment in Spacelift
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve promoted release metadata
        id: release
        shell: bash
        run: |
          set -euo pipefail

          MERGE_SHA="${GITHUB_SHA}"

          PARENTS="$(git rev-list --parents -n 1 "${MERGE_SHA}")"
          PARENT_COUNT="$(echo "${PARENTS}" | wc -w | tr -d ' ')"

          if [ "${PARENT_COUNT}" -lt 3 ]; then
            echo "Expected a merge commit on deploy-prod, but commit ${MERGE_SHA} does not have two parents."
            echo "Use PR merges into deploy-prod rather than direct pushes."
            exit 1
          fi

          RELEASE_SHA="$(echo "${PARENTS}" | awk '{print $3}')"
          RELEASE_KEY="workers/${RELEASE_SHA}/worker-bundle.tar.gz"

          echo "merge_sha=${MERGE_SHA}" >> "$GITHUB_OUTPUT"
          echo "release_sha=${RELEASE_SHA}" >> "$GITHUB_OUTPUT"
          echo "release_key=${RELEASE_KEY}" >> "$GITHUB_OUTPUT"

          echo "Resolved merge SHA: ${MERGE_SHA}"
          echo "Resolved promoted release SHA: ${RELEASE_SHA}"
          echo "Resolved release key: ${RELEASE_KEY}"

      - name: Show deploy inputs
        shell: bash
        run: |
          echo "stack_id=${{ vars.SPACELIFT_PROD_STACK_ID }}"
          echo "merge_sha=${{ steps.release.outputs.merge_sha }}"
          echo "release_sha=${{ steps.release.outputs.release_sha }}"
          echo "release_key=${{ steps.release.outputs.release_key }}"

      - name: Verify promoted artefact exists
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        shell: bash
        run: |
          set -euo pipefail

          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          BUCKET="kevinellen-artifacts"

          python3 -m pip install --no-cache-dir awscli >/dev/null 2>&1

          python3 -m awscli s3 ls \
            "s3://${BUCKET}/${{ steps.release.outputs.release_key }}" \
            --endpoint-url "${ENDPOINT}" >/dev/null

          echo "Artefact exists: ${{ steps.release.outputs.release_key }}"

      - name: Trigger PROD run via Spacelift GraphQL
        env:
          SPACELIFT_API_KEY_ENDPOINT: ${{ vars.SPACELIFT_API_KEY_ENDPOINT }}
          SPACELIFT_API_KEY_ID: ${{ secrets.SPACELIFT_API_KEY_ID }}
          SPACELIFT_API_KEY_SECRET: ${{ secrets.SPACELIFT_API_KEY_SECRET }}
          SPACELIFT_PROD_STACK_ID: ${{ vars.SPACELIFT_PROD_STACK_ID }}
          RELEASE_SHA: ${{ steps.release.outputs.release_sha }}
          RELEASE_KEY: ${{ steps.release.outputs.release_key }}
        shell: bash
        run: |
          set -euo pipefail

          test -n "${SPACELIFT_API_KEY_ENDPOINT:-}" || { echo "SPACELIFT_API_KEY_ENDPOINT is not set"; exit 1; }
          test -n "${SPACELIFT_API_KEY_ID:-}" || { echo "SPACELIFT_API_KEY_ID is not set"; exit 1; }
          test -n "${SPACELIFT_API_KEY_SECRET:-}" || { echo "SPACELIFT_API_KEY_SECRET is not set"; exit 1; }
          test -n "${SPACELIFT_PROD_STACK_ID:-}" || { echo "SPACELIFT_PROD_STACK_ID is not set"; exit 1; }
          test -n "${RELEASE_SHA:-}" || { echo "RELEASE_SHA is not set"; exit 1; }
          test -n "${RELEASE_KEY:-}" || { echo "RELEASE_KEY is not set"; exit 1; }

          JWT="$(
            curl -sS \
              -X POST "${SPACELIFT_API_KEY_ENDPOINT}/graphql" \
              -H "Content-Type: application/json" \
              --data "{\"query\":\"mutation GetSpaceliftToken(\$id: ID!, \$secret: String!) { apiKeyUser(id: \$id, secret: \$secret) { jwt } }\",\"variables\":{\"id\":\"${SPACELIFT_API_KEY_ID}\",\"secret\":\"${SPACELIFT_API_KEY_SECRET}\"}}" \
            | python3 -c 'import sys, json; print(json.load(sys.stdin)["data"]["apiKeyUser"]["jwt"])'
          )"

          echo "JWT acquired"

          RESPONSE="$(
            curl -sS \
              -X POST "${SPACELIFT_API_KEY_ENDPOINT}/graphql" \
              -H "Authorization: Bearer ${JWT}" \
              -H "Content-Type: application/json" \
              --data "$(cat <<EOF
          {
            "query": "mutation RunTrigger(\$stack: ID!, \$commitSha: String!, \$runtimeConfig: RuntimeConfigInput) { runTrigger(stack: \$stack, commitSha: \$commitSha, runtimeConfig: \$runtimeConfig) { id } }",
            "variables": {
              "stack": "${SPACELIFT_PROD_STACK_ID}",
              "commitSha": "${RELEASE_SHA}",
              "runtimeConfig": {
                "environment": [
                  {
                    "key": "TF_VAR_release_sha",
                    "value": "${RELEASE_SHA}"
                  },
                  {
                    "key": "TF_VAR_release_key",
                    "value": "${RELEASE_KEY}"
                  },
                  {
                    "key": "TF_VAR_worker_script_path",
                    "value": "/mnt/workspace/.artifact/releases/${RELEASE_SHA}/entry.js"
                  }
                ]
              }
            }
          }
          EOF
          )"
          )"

          echo "${RESPONSE}"

          printf '%s' "${RESPONSE}" | python3 - <<'PY'
          import json, sys
          data = json.load(sys.stdin)
          if data.get("errors"):
              print(json.dumps(data["errors"], indent=2))
              raise SystemExit(1)
          run_id = data.get("data", {}).get("runTrigger", {}).get("id")
          if not run_id:
              print("Missing runTrigger.id in response")
              raise SystemExit(1)
          PY

          RUN_ID="$(
            printf '%s' "${RESPONSE}" | python3 - <<'PY'
          import json, sys
          data = json.load(sys.stdin)
          if data.get("errors"):
              raise SystemExit(1)
          run_id = data.get("data", {}).get("runTrigger", {}).get("id")
          if not run_id:
              raise SystemExit(1)
          print(run_id)
          PY
          )"

          test -n "${RUN_ID}" || { echo "Failed to extract run ID"; exit 1; }

          echo "Triggered Spacelift run: ${RUN_ID}"
