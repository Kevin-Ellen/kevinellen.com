name: promote artefact to stg

on:
  workflow_dispatch:
    inputs:
      sha:
        description: Commit SHA from main to promote (leave blank for latest successful CI on main)
        required: false

permissions:
  contents: read
  actions: read

concurrency:
  group: promote-stg
  cancel-in-progress: true

jobs:
  promote-stg:
    runs-on: ubuntu-latest
    environment: stg

    steps:
      - name: Resolve artefact SHA
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_SHA: ${{ github.event.inputs.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          if [ -n "${INPUT_SHA:-}" ]; then
            RELEASE_SHA="${INPUT_SHA}"
          else
            API_URL="https://api.github.com/repos/${REPO}/actions/workflows/ci.yml/runs?branch=main&status=completed&per_page=20"

            JSON="$(curl -sS \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "${API_URL}")"

            RELEASE_SHA="$(echo "$JSON" | jq -r '.workflow_runs[] | select(.conclusion=="success") | .head_sha' | head -n1)"
          fi

          if [ -z "${RELEASE_SHA}" ]; then
            echo "Could not resolve release SHA"
            exit 1
          fi

          RELEASE_KEY="workers/${RELEASE_SHA}/worker-bundle.tar.gz"

          echo "RELEASE_SHA=${RELEASE_SHA}" >> "$GITHUB_ENV"
          echo "RELEASE_KEY=${RELEASE_KEY}" >> "$GITHUB_ENV"
          echo "STACK_ID=${{ vars.SPACELIFT_STG_STACK_ID }}" >> "$GITHUB_ENV"

          echo "Resolved SHA: ${RELEASE_SHA}"
          echo "Release key: ${RELEASE_KEY}"

      - name: Verify artefact exists in R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          set -euo pipefail

          pip install awscli >/dev/null

          aws s3 ls \
            "s3://kevinellen-artifacts/${RELEASE_KEY}" \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

      - name: Trigger Spacelift STG
        env:
          SPACELIFT_API_KEY_ENDPOINT: ${{ vars.SPACELIFT_API_KEY_ENDPOINT }}
          SPACELIFT_API_KEY_ID: ${{ secrets.SPACELIFT_API_KEY_ID }}
          SPACELIFT_API_KEY_SECRET: ${{ secrets.SPACELIFT_API_KEY_SECRET }}
        run: |
          set -euo pipefail

          JWT=$(curl -sS \
            -X POST "${SPACELIFT_API_KEY_ENDPOINT}/graphql" \
            -H "Content-Type: application/json" \
            --data "{\"query\":\"mutation GetSpaceliftToken(\$id: ID!, \$secret: String!) { apiKeyUser(id: \$id, secret: \$secret) { jwt } }\",\"variables\":{\"id\":\"${SPACELIFT_API_KEY_ID}\",\"secret\":\"${SPACELIFT_API_KEY_SECRET}\"}}" \
            | jq -r '.data.apiKeyUser.jwt')

          RESPONSE=$(curl -sS \
            -X POST "${SPACELIFT_API_KEY_ENDPOINT}/graphql" \
            -H "Authorization: Bearer ${JWT}" \
            -H "Content-Type: application/json" \
            --data "{
              \"query\": \"mutation RunTrigger(\$stack: ID!, \$commitSha: String!, \$runtimeConfig: RuntimeConfigInput) { runTrigger(stack: \$stack, commitSha: \$commitSha, runtimeConfig: \$runtimeConfig) { id } }\",
              \"variables\": {
                \"stack\": \"${STACK_ID}\",
                \"commitSha\": \"${RELEASE_SHA}\",
                \"runtimeConfig\": {
                  \"environment\": [
                    { \"key\": \"TF_VAR_release_sha\", \"value\": \"${RELEASE_SHA}\" },
                    { \"key\": \"TF_VAR_release_key\", \"value\": \"${RELEASE_KEY}\" },
                    { \"key\": \"TF_VAR_worker_script_path\", \"value\": \"/mnt/workspace/.artifact/releases/${RELEASE_SHA}/entry.js\" }
                  ]
                }
              }
            }")

          echo "$RESPONSE"

          RUN_ID=$(echo "$RESPONSE" | jq -r '.data.runTrigger.id')

          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "Failed to trigger Spacelift"
            exit 1
          fi

          echo "Triggered Spacelift run: $RUN_ID"
